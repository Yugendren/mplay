# tmux config scoped to the mplay session (loaded via tmux -f).

set -g prefix C-Space
set -g status off
set -g mouse on
set -g default-terminal "tmux-256color"
set -g focus-events on
set -sg escape-time 0
setw -g aggressive-resize on

# /  → song search (fzf over the whole library)
# :  → command palette (playlists, playback, queue, etc.)
# ?  → keybinding cheatsheet
# Popups are separate ptys, so these keys reach fzf normally inside the popup.
bind -n '/' display-popup -E -w 70% -h 70% -b rounded mplay-find
bind -n ':' display-popup -E -w 50% -h 50% -b rounded mplay-cmd
bind -n '?' display-popup -E -w 60% -h 70% -b rounded mplay-help
